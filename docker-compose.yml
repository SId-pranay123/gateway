services:
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6380:6379"   # 6380 on host, so it won't clash with any other local Redis on 6379
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres
    ports:
      - "5433:5432"   # 5433 on host, so it won't clash with any other local Postgres on 5432
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    volumes:
      - gateway-pg-data:/var/lib/postgresql/data
  
  grafana:
    image: grafana/grafana:latest
    container_name: gateway-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - gateway-grafana-data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    container_name: gateway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  gateway-pg-data:
  gateway-grafana-data: